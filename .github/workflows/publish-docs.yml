name: publish-docs

on:
  pull_request:
    paths:
      - 'fern/**'
      - '.github/workflows/publish-docs.yml'
  push:
    branches:
      - main
    paths:
      - 'fern/**'
      - '.github/workflows/publish-docs.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Fern CLI
        run: npm install -g fern-api

      - name: Validate Fern project
        run: fern check --warnings

  publish:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Fern CLI
        run: npm install -g fern-api

      - name: Publish Nebrija Creators docs
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: fern generate --docs --instance nebrija-creators.docs.buildwithfern.com
